  <!-- Structured data -->
  <script type="application/ld+json">

      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.cvenhance.in/#organization",
          "name": "CVEnhance",
          "alternateName": ["CV Enhance", "CV Enhance.in", "cvenhance.in"],

        {
          "@type": "WebSite",
          "@id": "https://www.cvenhance.in/#website",
          "name": "CVEnhance",
          "alternateName": ["CV Enhance", "cv enhance"],
          "url": "https://www.cvenhance.in/",
          "publisher": { "@id": "https://www.cvenhance.in/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.cvenhance.in/templates?type=CV_AND_RESUME&page=1&size=50&search={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "WebApplication",
          "name": "CVEnhance",
          "alternateName": "CV Enhance",
          "url": "https://www.cvenhance.in/",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",

            "ATS-friendly resume templates",
            "Resume / CV import (PDF, DOCX)",
            "Interview preparation",
            "PDF download"
          ],
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "INR"
          }
        }
      ]
    }
  </script>
