spring:
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_MODEL:gemini-flash-latest}
    retry:
      max-attempts: 3
  threads:
    virtual:
      enabled: ${USE_VIRTUAL_THREADS:true}
  config:
    import: optional:file:./.env[.properties],optional:file:/etc/secrets/.env[.properties]
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:2MB}
      max-request-size: ${MAX_UPLOAD_SIZE:2MB}
  application:
    name: ${APP_NAME:DOC-SERVICE}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: ${APP_TIMEZONE:Asia/Kolkata}
    dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${JPA_SHOW_SQL:true}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${OAUTH_REDIRECT_BASE:http://localhost:5173/careerhub}/login/oauth2/code/{registrationId}
            scope:
              - profile
              - email
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            redirect-uri: ${OAUTH_REDIRECT_BASE:http://localhost:5173/careerhub}/login/oauth2/code/{registrationId}
            scope:
              - read:user
              - user:email

logging:
  level:
    root: ${LOG_LEVEL_ROOT:ERROR}
    com.docservice.careerhub: ${LOG_LEVEL_APP:INFO}

server:
  port: ${PORT:5001}

google:
  clientId: ${GOOGLE_CLIENT_ID:}
  clientSecret: ${GOOGLE_CLIENT_SECRET:}

github:
  clientId: ${GITHUB_CLIENT_ID:}
  clientSecret: ${GITHUB_CLIENT_SECRET:}

supabase:
  bucket:
    name: ${SUPABASE_BUCKET_NAME:resume_pdf}
  service:
    key: ${SUPABASE_SERVICE_KEY:}
  url: ${SUPABASE_URL:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

oauth:
  success-redirect: ${OAUTH_SUCCESS_REDIRECT:http://localhost:5173}
  failure-redirect: ${OAUTH_FAILURE_REDIRECT:http://localhost:5173/login}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:your-256-bit-secret-key-must-be-at-least-32-characters-long}
    expiry-ms: ${AUTH_JWT_EXPIRY_MS:3600000}
  session:
    expiry-ms: ${AUTH_SESSION_EXPIRY_MS:2592000000}
  cookie:
    name: ${AUTH_COOKIE_NAME:ACCESS_TOKEN}
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    path: ${AUTH_COOKIE_PATH:/}

cashfree:
  app:
    id: ${CASHFREE_APP_ID:}
  secret:
    key: ${CASHFREE_SECRET_KEY:}
  environment: ${CASHFREE_ENV:PRODUCTION}
  api-version: ${CASHFREE_API_VERSION:2023-08-01}
  return-url: ${CASHFREE_RETURN_URL:https://cvenhance.in/payment/status?order_id={order_id}}

latex:
  compiler: ${LATEX_COMPILER:docker}
  docker-image: ${LATEX_DOCKER_IMAGE:texlive/texlive:latest}
  compile-timeout-seconds: ${LATEX_COMPILE_TIMEOUT_SECONDS:120}
