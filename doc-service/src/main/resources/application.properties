spring.config.import=optional:file:.env[.properties]

# Application
spring.application.name=${APP_NAME}
app.timezone=${APP_TIMEZONE}

# Logging
logging.level.root=${LOG_LEVEL_ROOT}

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Datasource
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=${APP_TIMEZONE:Asia/Kolkata}
spring.jpa.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL}

# Server
server.port=${SERVER_PORT}

# Google OAuth
google.clientId=${GOOGLE_CLIENT_ID}
google.clientSecret=${GOOGLE_CLIENT_SECRET}

# GitHub OAuth
github.clientId=${GITHUB_CLIENT_ID}
github.clientSecret=${GITHUB_CLIENT_SECRET}

# SpringDoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Frontend URL for CORS
frontend.url=${FRONTEND_URL}

# Email verification URL
verification.url=${VERIFICATION_URL}

# Embedded auth (auth-core) — all values sourced from environment
auth.jwt.secret=${AUTH_JWT_SECRET}
auth.jwt.expiry-ms=${AUTH_JWT_EXPIRY_MS:604800000}
auth.cookie.name=${AUTH_COOKIE_NAME:ACCESS_TOKEN}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.same-site=${AUTH_COOKIE_SAMESITE:Lax}
auth.default-role=${AUTH_DEFAULT_ROLE:APP_USER}
auth.frontend-url=${FRONTEND_URL}

# Social login (in-process). Redirect URIs to register with the providers:
#   http://localhost:5001/login/oauth2/code/google  and  /github
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
