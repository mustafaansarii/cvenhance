name: CI/CD — Build, Push & Deploy doc-service

on:
  push:
    branches: [master]
    paths:
      - 'doc-service/**'
      - 'payment-service/**'
      - 'ai-service/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  IMAGE: mustafaansari/doc-service

jobs:
  build-and-push:
    name: Test → Build image → Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install local library modules
        run: |
          mvn -B -q -DskipTests -f payment-service/pom.xml install
          mvn -B -q -DskipTests -f ai-service/pom.xml install

      - name: Run unit tests
        working-directory: doc-service
        run: mvn -B test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./doc-service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
